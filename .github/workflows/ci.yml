name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: gate (fmt + clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # ci.sh is the single source of truth for the gate — CI just invokes it.
      - run: ./ci.sh

  grammar:
    name: grammar (corpus + drift guard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Corpus tests + drift guard
        run: |
          if [ ! -d crates/tree-sitter-otui ]; then
            echo "No tree-sitter grammar crate on this branch — skipping."
            exit 0
          fi
          # Pin the CLI to the version the committed parser was generated with, so the
          # drift check compares like-for-like (a different CLI version can emit a
          # byte-different parser.c and cause a spurious failure).
          npm install -g tree-sitter-cli@0.26.10
          cd crates/tree-sitter-otui
          tree-sitter test
          tree-sitter generate
          git diff --exit-code -- src/parser.c src/grammar.json src/node-types.json \
            || (echo "::error::Generated parser is out of date. Run 'tree-sitter generate' in crates/tree-sitter-otui and commit the result." && exit 1)
